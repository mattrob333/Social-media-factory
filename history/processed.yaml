# Processed Content Tracker
# Auto-generated by the daily ingest / bookmark-miner / news-jack loops.
# Tracks every source item that's been processed to prevent duplicates.

last_ingest: null  # ISO timestamp of last successful ingest run

youtube:
  # Format: channel_url: last_processed_video_id
  channels: {}

x_accounts:
  # Format: account_handle: last_processed_tweet_id
  accounts: {}

x_bookmarks:
  # Mirrors state also held at
  # C:\Users\mrobe\AppData\Local\hermes\loop-state\bookmark-miner.json
  # This copy exists so the repo is self-describing; the loop-state JSON
  # remains the source of truth for the bookmark-miner skill itself.
  last_tick: null
  processed_bookmark_ids: []

github_trending:
  # Format: repo_full_name: last_seen_date — prevents re-surfacing the same
  # repo two days in a row unless star velocity spikes again.
  repos: {}

# Items that were skipped (low score) — don't re-process
skipped: []
